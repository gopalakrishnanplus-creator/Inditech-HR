services:
  db:
    image: mysql:8.4
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: inditech_hr
      MYSQL_USER: inditech_hr
      MYSQL_PASSWORD: inditech_hr
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 10s
      retries: 20

volumes:
  mysql_data:
