{% extends "base.html" %}
{% load socialaccount %}

{% block title %}Login | Inditech HR{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Login</h1>
                <p class="text-muted">Use your Google account to access the HR application.</p>
                <a class="btn btn-outline-dark w-100" href="{% provider_login_url 'google' process='login' %}">Continue with Google</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
