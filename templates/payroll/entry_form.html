{% extends "base.html" %}

{% block title %}Payment Decision | Inditech HR{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Payment decision for {{ object.full_name }}</h1>
                <p class="text-muted">Net payable: {{ object.net_payable }}</p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-flex gap-2">
                        <button class="btn btn-dark" type="submit">Save</button>
                        <a class="btn btn-outline-secondary" href="{% url 'payroll:run-detail' object.run_id %}">Back</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
